version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.13"
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    - uv venv
    - uv pip install .[dev]
    - uv run zensical build --clean
    - mkdir $READTHEDOCS_OUTPUT/html/
    - mv site/* $READTHEDOCS_OUTPUT/html/
